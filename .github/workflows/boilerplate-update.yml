name: Boilerplate update

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'generic-boilerplate tag to update to (default: latest release)'
        required: false
        type: string

permissions:
  id-token: write

concurrency:
  group: boilerplate-update
  cancel-in-progress: false

jobs:
  boilerplate-update:
    runs-on: ubuntu-latest

    steps:
      - name: Federate GitHub token via octo-sts
        id: octo-sts
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: fohte
          identity: ${{ github.event.repository.name }}-boilerplate-update
          domain: octo-sts.fohte.net

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ steps.octo-sts.outputs.token }}

      - name: Resolve target version
        id: target
        env:
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
          INPUT_VERSION: ${{ inputs.target_version }}
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            tag="$INPUT_VERSION"
          else
            tag="$(gh release view -R fohte/generic-boilerplate --json tagName -q .tagName)"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "branch=copier-update/$tag" >> "$GITHUB_OUTPUT"

      - name: Install mergiraf
        env:
          # renovate: datasource=gitea-tags depName=mergiraf/mergiraf registryUrl=https://codeberg.org
          MERGIRAF_VERSION: v0.17.0
        run: |
          set -euo pipefail
          # Going through mise/aqua would re-read the repo's .mise.toml, which
          # may itself be a copier conflict file after the update step.
          case "$(uname -m)" in
            x86_64) target=x86_64-unknown-linux-musl ;;
            aarch64) target=aarch64-unknown-linux-musl ;;
            *) echo "unsupported arch: $(uname -m)" >&2; exit 1 ;;
          esac
          mkdir -p "$HOME/.local/bin"
          curl -sSfL \
            "https://codeberg.org/mergiraf/mergiraf/releases/download/${MERGIRAF_VERSION}/mergiraf_${target}.tar.gz" \
            | tar -xz -C "$HOME/.local/bin"
          chmod +x "$HOME/.local/bin/mergiraf"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Configure merge conflict style
        # diff3 markers let mergiraf split each conflict into smaller hunks.
        # copier's default diff2 markers leave mergiraf unable to solve.
        run: git config merge.conflictStyle diff3

      - name: Prepare branch
        env:
          BRANCH: ${{ steps.target.outputs.branch }}
        run: |
          set -euo pipefail
          git fetch origin "$BRANCH" || true
          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi

      - name: Run copier update
        env:
          TAG: ${{ steps.target.outputs.tag }}
        run: |
          set -euo pipefail
          pipx run copier update --trust --defaults --vcs-ref "$TAG"

      - name: Restore executable bit on scripts/bootstrap
        run: |
          if [ -f scripts/bootstrap ]; then
            chmod +x scripts/bootstrap
          fi

      - name: Detect copier conflicts
        id: detect
        run: |
          set -euo pipefail
          # copier conflict marker. Pattern is split to avoid self-match.
          if git grep --untracked -l '<<<<<<< before '"updating" > /tmp/copier-conflicts.txt && [ -s /tmp/copier-conflicts.txt ]; then
            echo "has_conflicts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_conflicts=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve copier conflicts with mergiraf
        if: steps.detect.outputs.has_conflicts == 'true'
        continue-on-error: true
        # mergiraf falls back to line-based for the whole file when even one
        # conflict block isn't structurally resolvable, so we run it once per
        # block: for each block, mask all OTHER blocks with their "before
        # updating" (left) section, solve, then splice the resolved region
        # back into the original file. Blocks mergiraf still cannot solve in
        # isolation are kept intact.
        shell: node {0}
        run: |
          const fs = require('node:fs');
          const { spawnSync } = require('node:child_process');
          const { tmpdir } = require('node:os');
          const path = require('node:path');

          const RE = /<<<<<<< before updating\n(?<before>[\s\S]*?)\|\|\|\|\|\|\| last update\n(?<base>[\s\S]*?)=======\n(?<after>[\s\S]*?)>>>>>>> after updating\n/g;

          const files = fs.readFileSync('/tmp/copier-conflicts.txt', 'utf8')
            .split('\n').filter(Boolean);

          for (const file of files) {
            const text = fs.readFileSync(file, 'utf8');
            const blocks = [...text.matchAll(RE)];
            console.log(`${file}: ${blocks.length} block(s)`);
            if (blocks.length === 0) continue;

            const tmp = fs.mkdtempSync(path.join(tmpdir(), 'pb-'));
            const ext = path.extname(file);
            const resolved = new Map();

            for (let i = 0; i < blocks.length; i++) {
              let masked = '';
              let iStart = -1, iEnd = -1;
              let pos = 0;
              for (let j = 0; j < blocks.length; j++) {
                masked += text.slice(pos, blocks[j].index);
                if (j === i) {
                  iStart = masked.length;
                  masked += blocks[j][0];
                  iEnd = masked.length;
                } else {
                  masked += blocks[j].groups.before;
                }
                pos = blocks[j].index + blocks[j][0].length;
              }
              masked += text.slice(pos);

              const tmpFile = path.join(tmp, `block-${i}${ext}`);
              fs.writeFileSync(tmpFile, masked);
              spawnSync('mergiraf', ['solve', '--keep-backup=false', tmpFile], { stdio: 'inherit' });
              const out = fs.readFileSync(tmpFile, 'utf8');

              if (out.includes('<<<<<<< before updating')) {
                console.log(`  block ${i + 1}: unresolved`);
                continue;
              }
              const prefix = masked.slice(0, iStart);
              const suffix = masked.slice(iEnd);
              if (!out.startsWith(prefix) || !out.endsWith(suffix)) {
                console.log(`  block ${i + 1}: splice mismatch, skipping`);
                continue;
              }
              resolved.set(i, out.slice(prefix.length, out.length - suffix.length));
              console.log(`  block ${i + 1}: resolved`);
            }

            let result = '';
            let pos = 0;
            for (let i = 0; i < blocks.length; i++) {
              result += text.slice(pos, blocks[i].index);
              result += resolved.has(i) ? resolved.get(i) : blocks[i][0];
              pos = blocks[i].index + blocks[i][0].length;
            }
            result += text.slice(pos);
            fs.writeFileSync(file, result);
          }

      - name: Detect changes
        id: changes
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        with:
          # commit-action defaults branch to the invoking ref, which would
          # push back into the workflow's own branch and trip fail_on_self_push.
          branch: ${{ steps.target.outputs.branch }}
          commit_message: 'chore(deps): Update generic-boilerplate to ${{ steps.target.outputs.tag }}'
          workflow: deny
          github_token: ${{ steps.octo-sts.outputs.token }}

      - name: Create or update PR
        if: steps.changes.outputs.changed == 'true'
        env:
          BRANCH: ${{ steps.target.outputs.branch }}
          TAG: ${{ steps.target.outputs.tag }}
          GH_TOKEN: ${{ steps.octo-sts.outputs.token }}
        run: |
          set -euo pipefail
          title="chore(deps): Update generic-boilerplate to $TAG"
          body="Automated boilerplate update to \`$TAG\` via \`boilerplate-update.yml\`."
          existing="$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' || true)"
          if [ -n "$existing" ]; then
            gh pr edit "$existing" --title "$title" --body "$body"
            pr="$existing"
          else
            pr="$(gh pr create --base master --head "$BRANCH" --title "$title" --body "$body")"
          fi
          gh pr merge "$pr" --squash --auto
